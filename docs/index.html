<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="廿日市市の地域ニュースをまとめて確認できるアプリ（廿日市商工会議所）">
  <meta name="theme-color" content="#C0392B">
  <title>廿日市市ニュース</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <div class="app-container">

    <!-- ユーザー選択画面 -->
    <section id="user-screen" class="user-screen"></section>

    <!-- メインアプリ（ユーザー選択後） -->
    <div id="main-app" style="display:none">

      <!-- ヘッダー -->
      <header class="app-header">
        <div class="header-main">
          <div class="header-logo">
            廿日市市ニュース
          </div>
          <button class="header-btn" id="user-switch-btn" aria-label="ユーザー切替">
            <span class="header-user-chip" id="header-user-name">-</span>
          </button>
          <button class="header-btn" id="search-btn" aria-label="検索">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          </button>
        </div>
        <div class="header-meta" id="header-meta">更新日時を読み込み中…</div>
      </header>

      <!-- ページコンテナ -->

      <!-- ニュース一覧 -->
      <section id="news-page" class="page active">
        <div class="filter-bar">
          <div class="filter-chips" id="category-chips"></div>
        </div>
        <div class="date-filter-bar">
          <span class="date-filter-label">📅 日付</span>
          <div class="date-filter-chips" id="date-filter-chips"></div>
        </div>
        <div class="sort-bar">
          <button class="sort-btn active" id="sort-importance">重要度順</button>
          <span class="sort-separator">|</span>
          <button class="sort-btn" id="sort-newest">新着順</button>
          <span class="article-count" id="article-count"></span>
        </div>
        <div class="article-list" id="article-list"></div>
      </section>

      <!-- 記事詳細 -->
      <section id="detail-page" class="page"></section>

      <!-- 保存済み -->
      <section id="saved-page" class="page"></section>

      <!-- 管理 -->
      <section id="admin-page" class="page">
        <div style="padding:16px 16px 0">
          <h2 style="font-family:var(--font-serif);font-size:var(--text-xl);font-weight:700;margin-bottom:4px">設定・管理</h2>
          <p style="font-size:var(--text-sm);color:var(--color-text-secondary)">収集ソースやキーワードを管理できます</p>
        </div>
        <div id="admin-content"></div>
      </section>

      <!-- ボトムナビ -->
      <nav class="bottom-nav" aria-label="メインナビゲーション">
        <button class="nav-item active" data-page="news">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8M15 18h-5M10 6h8v4h-8V6Z"/></svg>
          ニュース
        </button>
        <button class="nav-item" data-page="saved">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          保存済み
        </button>
        <button class="nav-item" data-page="admin">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          設定
        </button>
      </nav>

    </div><!-- /main-app -->

    <!-- 検索オーバーレイ -->
    <div id="search-overlay" class="search-overlay" style="display:none">
      <div class="search-header">
        <div class="search-input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="search" class="search-input" id="search-input" placeholder="記事を検索…" autocomplete="off">
        </div>
        <button class="search-cancel" id="search-cancel">キャンセル</button>
      </div>
      <div class="search-results" id="search-results">
        <div class="empty-state" style="padding-top:40px">
          <p style="color:var(--color-text-muted)">キーワードを入力してください</p>
        </div>
      </div>
    </div>

  </div><!-- /app-container -->

  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
