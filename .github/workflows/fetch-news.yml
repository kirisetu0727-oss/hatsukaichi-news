name: Fetch Hatsukaichi News

on:
  schedule:
    # 毎日 JST AM6:00 = UTC 前日21:00
    - cron: '0 21 * * *'
  workflow_dispatch:
    # 手動実行も可能

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch and analyze news
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TZ: Asia/Tokyo
        run: python scripts/fetch_news.py

      - name: Commit and push
        run: |
          git config user.name  "hatsukaichi-news-bot"
          git config user.email "bot@hatsukaichi-news.local"
          git add docs/data/articles.json docs/data/.processed_ids.json 2>/dev/null || true
          git diff --staged --quiet || \
            git commit -m "chore: update articles $(date '+%Y-%m-%d %H:%M JST')"
          git push
